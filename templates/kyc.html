<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KYC Status - Shariah Hub</title>

    <!-- Bootstrap 5.3.3 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <style>
        :root {
            --card-bg: rgba(255, 255, 255, 0.85);
            --border-color: rgba(15, 23, 42, 0.08);
            --accent-blue: #0284c7;
            --accent-green: #10b981;
            --text-dark: #0f172a;
            --text-muted: #64748b;
        }

        body {
            background: linear-gradient(135deg, #f1f5f9 0%, #cbd5e1 100%);
            color: var(--text-dark);
            font-family: 'Outfit', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .glass-card {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--border-color);
            border-radius: 24px;
            box-shadow: 0 20px 45px rgba(15, 23, 42, 0.08);
            padding: 40px;
            max-width: 550px;
            width: 100%;
            text-align: center;
        }

        .progress-bar-container {
            height: 6px;
            background: rgba(15, 23, 42, 0.06);
            border-radius: 3px;
            overflow: hidden;
            margin: 25px 0;
            position: relative;
        }

        .progress-bar-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--accent-blue) 0%, var(--accent-green) 100%);
            border-radius: 3px;
            width: 45%;
            animation: moveProgress 2.5s infinite ease-in-out;
        }

        @keyframes moveProgress {
            0% {
                left: -45%;
            }
            100% {
                left: 100%;
            }
        }

        .status-badge {
            background: rgba(2, 132, 199, 0.08);
            color: var(--accent-blue);
            border: 1px solid rgba(2, 132, 199, 0.2);
            font-weight: 700;
            letter-spacing: 0.05em;
            padding: 8px 18px;
            border-radius: 12px;
            text-transform: uppercase;
            font-size: 0.85rem;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            margin-bottom: 20px;
        }

        .btn-home {
            background: linear-gradient(135deg, #0284c7 0%, #0369a1 100%);
            border: none;
            border-radius: 12px;
            color: white;
            font-weight: 600;
            padding: 12px 28px;
            transition: all 0.2s;
        }

        .btn-home:hover {
            opacity: 0.95;
            box-shadow: 0 0 12px rgba(2, 132, 199, 0.3);
            transform: scale(1.02);
        }
    </style>
</head>

<body>

    <div class="glass-card">
        <!-- Status Icon -->
        <div class="mb-4">
            <div class="spinner-border text-info" style="width: 3rem; height: 3rem;" role="status">
                <span class="visually-hidden">Loading...</span>
            </div>
        </div>

        <!-- Status Badge -->
        <div class="status-badge">
            <i class="bi bi-clock-history"></i> KYC Updation
        </div>

        <!-- Heading -->
        <h2 class="fw-bold text-dark mb-2">Updation on progress</h2>
        
        <!-- Animated loader bar -->
        <div class="progress-bar-container">
            <div class="progress-bar-fill"></div>
        </div>

        <!-- Description -->
        <p class="text-secondary mb-4 px-2" style="font-size: 0.95rem; line-height: 1.6;">
            Our ethical compliance committee is reviewing your company profile and submitted financial statements. Additional KYC credential validation is currently underway.
        </p>

        <!-- Back Home button -->
        <a href="/" class="btn btn-home">
            <i class="bi bi-house-door-fill me-2"></i>Return to Home
        </a>
    </div>

</body>

</html>
